# Minimal config used only during initial Let's Encrypt certificate issuance.
# After init-letsencrypt.sh completes, nginx switches to nginx.conf.
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
